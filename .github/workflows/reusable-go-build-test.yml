name: go-build-test
on: 
  workflow_call:
    inputs:
      go-version: { default: '1.23', type: string } 
      go-version-file: { required: true, type: string }
      cache-dependency-path: { required: true, type: string }
      code-path: { required: true, type: string }
    outputs:
      data:
        value: ${{ jobs.job1.outputs.out1 }}

jobs:
  job1:
      runs-on: ubuntu-latest
      outputs:
        out1: ${{ steps.status.outputs.pass }}
      steps:
        - name: go-steup
          uses: actions/setup-go@v6
          with:
            go-version: ${{ inputs.go-version }}
            go-version-file: ${{ inputs.go-version-file }}
            cache-dependency-path: ${{ inputs.cache-dependency-path }}
        - name: run go-format
          run: go fmt main.go
          working-directory: ${{ inputs.code-path }}
        - name: run go-vet
          run: go vet main.go
          working-directory: ${{ inputs.code-path }}

        - name: testing
          run: go test
          working-directory: ${{ inputs.code-path }}

        - name: status
          id: status
          if: success()
          run: echo "pass='all test cases passed'" >> "$GITHUB_OUTPUT"
          
        
        
      
