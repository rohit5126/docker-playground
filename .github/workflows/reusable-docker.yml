name: docker-reuse
on:
  workflow_call:
    outputs:
      image:
        description: "the image name"
        value: ${{ jobs.docker.outputs.out1 }}
      imageid:
        description: "image i "
        value: ${{ jobs.docker.outputs.out2 }}
    inputs:
      image-name: { required: true, type: string }
      tag: {required: false, default: latest, type: string }
      docker-name: { required: true, type: string }
      context: { required: true, type: string }
    secrets:
      docker_username: { required: true }
      docker_password: { required: true }
  
      
jobs:   
  docker:
    outputs:
      out1: ${{ steps.image.outputs.imageid }}
      out2: ${{ steps.image.outputs.imageurl }}
    runs-on: ubuntu-latest
    steps:
      - name: code
        uses: actions/checkout@v6
      - name: docker login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.docker_username }}
          password: ${{ secrets.docker_password }}

      - name: docker-build
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context }}
          push: true
          tags: ${{ inputs.docker-name }}/${{ inputs.image-name }}:${{ inputs.tag }}
      - id: image
        env: 
          url: '${{ inputs.docker-name }}/${{ inputs.image-name }}:${{ inputs.tag }}'
        
        run: |
          echo "imageurl=$url" >> "$GITHUB_OUTPUT"
      
        
          
      
