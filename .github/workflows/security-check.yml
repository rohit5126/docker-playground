name: dependency-check
on: 
  push: 
permissions:
  contents: read
jobs:
  Go-dependecy-check:
    runs-on: ubuntu-latest
    permissions:
      repository-projects: read
    steps:
      - name: code
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      
      - name: Run govulncheck and export report
        uses: golang/govulncheck-action@v1
        with:
          output-format: sarif
          output-file: govulncheck-results.sarif
          work-dir: backend/

      - name: Upload results to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Go-vulnerabilities-report
          path: govulncheck-results.sarif
          retention-days: 7
          
  Node-dependency-check:
    runs-on: ubuntu-latest
    steps:
      - name: code-checkout
        uses: actions/checkout@v7
        
      - name: node-setup
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache-dependency-path: frontend/
          
      - name: dependency check
        run: npm audit > audit_report.txt
        working-directory: frontend/
        
      - name: report-artificats
        uses: actions/upload-artifact@v4
        with:
          name: node-vulnerabilities-report
          path: audit_report.txt
          retention-days: 7


